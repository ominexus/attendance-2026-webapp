name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build
        env:
          # GitHub Pages 배포 시 리포명이 path prefix가 됨 (예: /attendance-2026-webapp/)
          VITE_BASE: /${{ github.event.repository.name }}/
          # Supabase 환경변수는 Repository Secrets에서 주입
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          # Pass Code 단축 로그인 (빌드 번들에 포함됨 - 실 보호는 RLS 담당)
          VITE_PASS_CODE: ${{ secrets.PASS_CODE }}
          VITE_ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
          VITE_ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
        run: pnpm build:pages

      - name: SPA fallback (copy index.html → 404.html)
        run: cp dist/public/index.html dist/public/404.html

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
